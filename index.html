<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💕 For You</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: #1a0010;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(180,0,80,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(220,50,100,0.13) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(150,0,60,0.15) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,0,5,0.75);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #popup {
      background: linear-gradient(145deg, #2d0020, #1a000f);
      border: 1px solid rgba(255,100,150,0.25);
      border-radius: 24px;
      padding: 52px 48px 44px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 0 60px rgba(220,0,80,0.2), 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,150,180,0.1);
      animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(.7) translateY(30px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .popup-hearts {
      font-size: 2.4rem;
      letter-spacing: 6px;
      margin-bottom: 20px;
      animation: heartbeat 1.4s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform:scale(1); }
      50%      { transform:scale(1.12); }
    }
    #popup h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.25;
    }
    #popup p {
      font-size: .9rem;
      color: rgba(255,200,220,0.55);
      margin-bottom: 36px;
      font-style: italic;
    }
    .btn-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 56px;
      align-items: center;
    }
    .btn {
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 1px;
      border: none;
      border-radius: 50px;
      padding: 14px 34px;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s, opacity .18s;
      white-space: nowrap;
    }
    #yesBtn {
      background: linear-gradient(135deg, #ff3880, #e8005e);
      color: #fff;
      box-shadow: 0 8px 30px rgba(232,0,94,0.45);
    }
    #yesBtn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 14px 40px rgba(232,0,94,0.6); }
    #noBtn {
      background: transparent;
      border: 1px solid rgba(255,100,150,0.3);
      color: rgba(255,160,190,0.7);
    }
    #noBtn:hover { background: rgba(255,100,150,0.08); }
    #noBtn.disabled { opacity:0; pointer-events:none; cursor:default; transform:scale(0); transition:all .3s; }
    .extra-yes {
      background: linear-gradient(135deg, #ff3880, #e8005e);
      color: #fff;
      box-shadow: 0 6px 20px rgba(232,0,94,0.35);
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    .extra-yes:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 10px 30px rgba(232,0,94,0.5); }
    #videoSection {
      display: none;
      position: relative;
      z-index: 1;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 40px 20px;
      width: 100%;
      max-width: 860px;
    }
    #videoSection.visible { display: flex; }
    .video-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #fff;
      text-align: center;
      animation: fadeSlide .7s ease both;
    }
    .video-title span { color: #ff3880; }
    @keyframes fadeSlide {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    #playBtn {
      display: none;
      background: linear-gradient(135deg, #ff3880, #e8005e);
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      border: none;
      border-radius: 50px;
      padding: 18px 48px;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(232,0,94,0.5), 0 8px 30px rgba(232,0,94,0.4);
      animation: glowPulse 1.6s ease-in-out infinite;
      letter-spacing: 1px;
    }
    #playBtn.visible { display: block; }
    #playBtn:hover { transform: translateY(-3px) scale(1.06); }
    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 30px rgba(232,0,94,0.5), 0 8px 30px rgba(232,0,94,0.4); }
      50%      { box-shadow: 0 0 60px rgba(232,0,94,0.9), 0 8px 40px rgba(232,0,94,0.6); }
    }
    .video-wrapper {
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(220,0,80,0.25), 0 30px 80px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,100,150,0.2);
      background: #000;
      position: relative;
      padding-top: 56.25%;
      display: none;
    }
    .video-wrapper.visible { display: block; }
    .video-wrapper iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }
    #confettiCanvas { position:fixed; inset:0; pointer-events:none; z-index:200; }
  </style>
</head>
<body>
  <canvas id="confettiCanvas"></canvas>

  <div id="overlay">
    <div id="popup">
      <div class="popup-hearts">💕</div>
      <h1>Do you love me?</h1>
      <p>Think very carefully before you answer…</p>
      <div class="btn-row" id="btnRow">
        <button class="btn" id="yesBtn" onclick="onYes()">Yes 💖</button>
        <button class="btn" id="noBtn"  onclick="onNo()">No</button>
      </div>
    </div>
  </div>

  <div id="videoSection">
    <div class="video-title">Love you toooo!!! <span>💕</span></div>
    <button id="playBtn" onclick="playVideo()">▶ Play Video 💕</button>
    <div class="video-wrapper" id="videoWrapper">
      <iframe id="ytIframe" src=""
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>
    </div>
  </div>

  <script>
    let noClicks = 0;

    function onNo() {
      noClicks++;
      document.getElementById('noBtn').classList.add('disabled');
      const btnRow = document.getElementById('btnRow');
      const labels = ['Absolutely yes 💗','Of course yes 💓','Yes, always 💞','Definitely yes 💖','Yes forever 💝','100% yes 🥰'];
      const count = Math.min(noClicks * 2, labels.length);
      for (let i = 0; i < count; i++) {
        if (btnRow.querySelectorAll('.extra-yes').length >= labels.length) break;
        const b = document.createElement('button');
        b.className = 'btn extra-yes';
        b.textContent = labels[i];
        b.onclick = onYes;
        btnRow.appendChild(b);
      }
    }

    function onYes() {
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('videoSection').classList.add('visible');
      document.getElementById('playBtn').classList.add('visible');
      startHeartConfetti();
    }

    function playVideo() {
      document.getElementById('ytIframe').src =
        'https://www.youtube.com/embed/lVvb3vXMa1g?autoplay=1&rel=0&modestbranding=1&vq=hd1080';
      document.getElementById('videoWrapper').classList.add('visible');
      document.getElementById('playBtn').style.display = 'none';
    }

    // ── Heart Confetti ──
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    let hearts = [];
    let spawnActive = true;
    let animId = null;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    function spawnHeart() {
      const size = 8 + Math.random() * 18;
      const colors = ['#ff1461','#ff3880','#ff6fa8','#ff0044','#ff4d88','#e8005e','#ffb3cc'];
      return {
        x: Math.random() * canvas.width, y: -size * 2, size,
        color: colors[Math.floor(Math.random() * colors.length)],
        vx: (Math.random() - 0.5) * 2.5, vy: 1.5 + Math.random() * 3,
        rot: Math.random() * Math.PI * 2, rotV: (Math.random() - 0.5) * 0.12,
        alpha: 0.85 + Math.random() * 0.15,
        wobble: Math.random() * Math.PI * 2, wobbleSpeed: 0.04 + Math.random() * 0.04,
      };
    }

    function drawHeart(h) {
      const s = h.size;
      ctx.save();
      ctx.globalAlpha = h.alpha;
      ctx.fillStyle = h.color;
      ctx.translate(h.x, h.y);
      ctx.rotate(h.rot);
      ctx.beginPath();
      ctx.moveTo(0, -0.3 * s);
      ctx.bezierCurveTo( 0.5*s, -1*s,  1.2*s,  0.1*s,  0,  0.9*s);
      ctx.bezierCurveTo(-1.2*s,  0.1*s, -0.5*s, -1*s,  0, -0.3*s);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function startHeartConfetti() {
      spawnActive = true;
      hearts = [];

      // Initial burst
      for (let i = 0; i < 100; i++) {
        const h = spawnHeart();
        h.y = Math.random() * canvas.height * 0.6;
        hearts.push(h);
      }

      // Stop spawning after exactly 8 seconds
      const stopTimer = setTimeout(function() {
        spawnActive = false;
      }, 8000);

      let frameCount = 0;

      function frame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frameCount++;

        // Spawn new hearts every 4 frames while active
        if (spawnActive && frameCount % 4 === 0 && hearts.length < 250) {
          hearts.push(spawnHeart());
          hearts.push(spawnHeart());
        }

        // Update and draw
        for (let i = 0; i < hearts.length; i++) {
          const h = hearts[i];
          h.wobble += h.wobbleSpeed;
          h.x += h.vx + Math.sin(h.wobble) * 0.8;
          h.y += h.vy;
          h.rot += h.rotV;
          drawHeart(h);
        }

        // Remove fallen hearts
        hearts = hearts.filter(h => h.y < canvas.height + 80);

        // Continue until no hearts remain and spawning is off
        if (spawnActive || hearts.length > 0) {
          animId = requestAnimationFrame(frame);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }

      if (animId) cancelAnimationFrame(animId);
      animId = requestAnimationFrame(frame);
    }
  </script>
</body>
</html>
